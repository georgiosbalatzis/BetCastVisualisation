<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="BetCast - Betting statistics visualization tool"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Social icons are inline SVGs — no external Font Awesome needed -->
    <title>BetCast F1Stories</title>
  </head>
  <body>
    <!-- Anti-flicker: apply theme class BEFORE React mounts to prevent flash -->
    <script>
      (function() {
        var s = 'auto';
        try { s = localStorage.getItem('betcast_theme') || 'auto'; } catch(e) {}
        var d = s === 'dark' || (s === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.body.classList.add(d ? 'dark-mode' : 'light-mode');
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
